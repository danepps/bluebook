name: Bump CSL <updated> timestamp

on:
  push:
    branches: [main]
    paths:
      - BluebookDSEStyle.csl
      - BluebookDSEStyle-Experimental.csl

permissions:
  contents: write

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Rewrite <updated> in any CSL that changed in this push
        run: |
          NOW="$(date -u +'%Y-%m-%dT%H:%M:%S+00:00')"
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- '*.csl' || true)
          if [ -z "$CHANGED" ]; then
            echo "No CSL files changed in this push; nothing to do."
            exit 0
          fi
          echo "Changed CSL files:"
          echo "$CHANGED"
          for f in $CHANGED; do
            if [ -f "$f" ]; then
              sed -i -E "s|<updated>[^<]*</updated>|<updated>${NOW}</updated>|" "$f"
            fi
          done

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- '*.csl'; then
            echo "No change to <updated>; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.csl'
          git commit -m "chore: bump CSL <updated> timestamp [skip ci]"
          git push origin main
